<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agents Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: white; min-height: 100vh; }
    
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; }
    .cart-btn { background: #e94560; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .product { background: #1a1a2e; border-radius: 12px; padding: 24px; border: 1px solid #333; }
    .product:hover { border-color: #e94560; }
    .product-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .product h3 { margin-bottom: 8px; }
    .product p { color: #888; font-size: 0.9rem; margin-bottom: 16px; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .price { font-size: 1.5rem; font-weight: bold; color: #e94560; }
    .add-btn { background: #e94560; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .add-btn:disabled { background: #444; cursor: not-allowed; }
    
    .cart-section { background: #1a1a2e; border-radius: 12px; padding: 24px; }
    .cart-section h2 { margin-bottom: 20px; }
    .cart-items { margin-bottom: 20px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; background: #252540; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .cart-item button { background: #ff4444; color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; }
    .cart-total { display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; padding-top: 20px; border-top: 1px solid #333; }
    .checkout-btn { width: 100%; background: #10b981; color: white; padding: 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: 600; }
    .checkout-btn:disabled { background: #444; cursor: not-allowed; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🤖 AI Agents Store</h1>
    <button class="cart-btn" onclick="document.getElementById('cart').scrollIntoView({behavior:'smooth'})">🛒 Cart (<span id="cart-count">0</span>)</button>
  </header>

  <main class="container">
    <div class="products" id="products"></div>
    
    <div class="cart-section" id="cart">
      <h2>Your Cart</h2>
      <div class="cart-items" id="cart-items">
        <p style="color: #666;">Your cart is empty</p>
      </div>
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="checkout-btn" id="checkout-btn" onclick="checkout()" disabled>Checkout</button>
    </div>
  </main>

  <script>
    // Products - server-side this would be secure, client-side for demo
    const products = [
      { id: 'social-media-manager', name: 'Social Media Manager', desc: 'Auto-post, schedule, and engage on X, Instagram, Facebook.', price: 79, icon: '📱' },
      { id: 'local-seo', name: 'Local SEO', desc: 'Optimize Google Business profile and get found locally.', price: 79, icon: '🔍' },
      { id: 'email-newsletter', name: 'Email Newsletter', desc: 'Weekly newsletters written and scheduled automatically.', price: 79, icon: '📧' },
      { id: 'event-agent', name: 'Event Agent', desc: 'Automate taproom event promotion, RSVPs, and reminders.', price: 79, icon: '📅' },
      { id: 'brewery-bundle', name: 'Brewery Bundle', desc: 'All 4 AI Agents — everything you need.', price: 199, icon: '🎁' },
    ];

    let cart = [];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => `
        <div class="product">
          <div class="product-icon">${p.icon}</div>
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <div class="product-footer">
            <span class="price">$${p.price}</span>
            <button class="add-btn" onclick="addToCart('${p.id}')" ${cart.includes(p.id) ? 'disabled' : ''}>
              ${cart.includes(p.id) ? 'In Cart' : 'Add to Cart'}
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      if (!cart.includes(id)) {
        cart.push(id);
        renderProducts();
        renderCart();
      }
    }

    function removeFromCart(id) {
      cart = cart.filter(i => i !== id);
      renderProducts();
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const countEl = document.getElementById('cart-count');
      const checkoutBtn = document.getElementById('checkout-btn');
      
      countEl.textContent = cart.length;
      
      if (cart.length === 0) {
        container.innerHTML = '<p style="color: #666;">Your cart is empty</p>';
        totalEl.textContent = '$0.00';
        checkoutBtn.disabled = true;
        return;
      }

      let total = 0;
      container.innerHTML = cart.map(id => {
        const p = products.find(x => x.id === id);
        total += p.price;
        return `
          <div class="cart-item">
            <span>${p.icon} ${p.name}</span>
            <div>
              <span>$${p.price}</span>
              <button onclick="removeFromCart('${id}')">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      totalEl.textContent = '$' + total.toFixed(2);
      checkoutBtn.disabled = false;
    }

    async function checkout() {
      if (cart.length === 0) return;
      
      const btn = document.getElementById('checkout-btn');
      btn.textContent = 'Processing...';
      btn.disabled = true;

      // SECURITY: In production, call YOUR backend API which calculates prices server-side
      // This is a demo that creates separate Square links for each product
      // For production, replace with your Square checkout API endpoint
      
      alert('This demo would connect to your Square checkout API. Add your Square API integration to make this work!');
      
      btn.textContent = 'Checkout';
      btn.disabled = false;
    }

    renderProducts();
    renderCart();
  </script>
</body>
</html>
